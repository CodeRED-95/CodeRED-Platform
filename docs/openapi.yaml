openapi: 3.0.3
info:
  title: CodeRED Platform API
  version: 1.0.0
  description: |
    API REST para consultas independientes de agencias y DNI en CodeRED Platform.
    Crea y revoca credenciales desde API y Tokens. En Authorize pega un token Sanctum
    con agencies:read para el catálogo o profile:read para /me. Nunca incluyas tokens reales
    en URLs, capturas, código fuente o documentación.
tags:
  - name: Sistema
    description: Estado público del servicio.
  - name: Agencias
    description: Consulta del catálogo oficial; requiere agencias:consultar.
  - name: DNI
    description: Consulta DNI; requiere dni:consultar.
  - name: Catálogo
    description: Metadatos del catálogo; requiere agencies:read.
  - name: Perfil
    description: Identidad del token; requiere profile:read.
servers:
  - url: /api/v1
paths:
  /health:
    get:
      tags: [Sistema]
      summary: Estado básico del servicio
      operationId: health
      responses:
        '200':
          description: Servicio disponible
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Health'
              example:
                status: ok
                api_version: v1
                timestamp: '2026-07-19T12:00:00Z'
        '503':
          description: Base de datos no disponible
  /agencias:
    get:
      tags: [Agencias]
      summary: Listar agencias con token del servicio Agencias
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: agencia, in: query, schema: { type: string } }
        - { name: departamento, in: query, schema: { type: string } }
        - { name: provincia, in: query, schema: { type: string } }
        - { name: distrito, in: query, schema: { type: string } }
        - { name: tamano, in: query, schema: { type: string, enum: [small, medium, large] } }
        - { name: co, in: query, schema: { type: boolean } }
        - { name: estado, in: query, schema: { $ref: '#/components/schemas/AgencyStatus' } }
        - { name: per_page, in: query, schema: { type: integer, minimum: 1, maximum: 100 } }
      responses:
        '200': { description: Página de agencias }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationError' }
        '429': { $ref: '#/components/responses/RateLimited' }
  /agencias/{id}:
    get:
      tags: [Agencias]
      summary: Obtener agencia por ID interno
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        '200': { description: Agencia encontrada }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
  /dni/{dni}:
    get:
      tags: [DNI]
      summary: Consultar persona por DNI
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: dni, in: path, required: true, schema: { type: string, pattern: '^\\d{8}$' } }
      responses:
        '200': { description: Datos públicos normalizados del DNI }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { description: DNI no encontrado }
        '422': { $ref: '#/components/responses/ValidationError' }
        '429': { $ref: '#/components/responses/RateLimited' }
        '503': { description: Proveedor temporalmente no disponible }
  /agencies:
    get:
      tags: [Agencias]
      description: Devuelve agencias paginadas. Usa Try it out para combinar búsqueda, filtros, orden y paginación.
      summary: Listar agencias
      operationId: listAgencies
      security:
        - bearerAuth: []
      parameters:
        - { name: search, in: query, schema: { type: string, maxLength: 150 } }
        - { name: status, in: query, schema: { $ref: '#/components/schemas/AgencyStatus' } }
        - { name: department, in: query, schema: { type: string } }
        - { name: province, in: query, schema: { type: string } }
        - { name: district, in: query, schema: { type: string } }
        - { name: size, in: query, schema: { type: string, enum: [small, medium, large] } }
        - { name: has_terrestrial, in: query, schema: { type: boolean } }
        - { name: has_air, in: query, schema: { type: boolean } }
        - { name: sort, in: query, schema: { type: string, enum: [code, name, external_id, department, updated_at] } }
        - { name: direction, in: query, schema: { type: string, enum: [asc, desc] } }
        - { name: per_page, in: query, schema: { type: integer, minimum: 1, maximum: 100, default: 50 } }
        - { name: page, in: query, schema: { type: integer, minimum: 1 } }
      responses:
        '200':
          description: Página de agencias
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgencyPage'
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationError' }
        '429': { $ref: '#/components/responses/RateLimited' }
  /agencies/search:
    get:
      tags: [Agencias]
      summary: Buscar agencias
      description: Búsqueda rápida heredada que devuelve hasta 20 coincidencias del catálogo.
      operationId: searchAgencies
      security:
        - bearerAuth: []
      parameters:
        - name: q
          in: query
          description: Texto a buscar en Code, agencia o ubicación.
          schema: { type: string }
      responses:
        '200': { description: Coincidencias de agencias }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '429': { $ref: '#/components/responses/RateLimited' }
  /agencies/snapshot:
    get:
      tags: [Agencias]
      summary: Descargar snapshot completo
      description: Catálogo activo completo para sincronización inicial o recuperación después de full_sync_required.
      operationId: agencySnapshot
      security:
        - bearerAuth: []
      responses:
        '200': { description: Snapshot completo de agencias activas }
        '304': { description: El snapshot no cambió para el ETag enviado }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '429': { $ref: '#/components/responses/RateLimited' }
  /agencies/version:
    get:
      tags: [Agencias]
      summary: Consultar versión heredada del catálogo
      description: Versión pública conservada por compatibilidad con clientes existentes.
      operationId: agencyVersion
      security:
        - bearerAuth: []
      responses:
        '200': { description: 'Versión, fecha y total de agencias activas' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '429': { $ref: '#/components/responses/RateLimited' }
  /agencies/changes:
    get:
      tags: [Agencias]
      summary: Obtener cambios incrementales
      description: Devuelve eventos posteriores a un cursor firmado. Repite con next_cursor mientras has_more sea true.
      operationId: agencyChanges
      security:
        - bearerAuth: []
      parameters:
        - name: cursor
          in: query
          required: true
          description: Cursor opaco obtenido desde metadata o la respuesta anterior.
          schema: { type: string, maxLength: 1024 }
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 500, default: 100 }
      responses:
        '200':
          description: Página ordenada de cambios
          headers:
            Cache-Control: { schema: { type: string }, example: 'private, no-store' }
            Vary: { schema: { type: string }, example: 'Authorization, Accept-Encoding' }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AgencyChanges' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409': { $ref: '#/components/responses/FullSyncRequired' }
        '422': { $ref: '#/components/responses/ValidationError' }
        '429': { $ref: '#/components/responses/RateLimited' }
  /agencies/{code}:
    get:
      tags: [Agencias]
      description: Usa el Code estable de CodeRED, no el ID interno ni el ID externo.
      summary: Obtener agencia por Code
      operationId: getAgencyByCode
      security:
        - bearerAuth: []
      parameters:
        - name: code
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Agencia
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data: { $ref: '#/components/schemas/Agency' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
  /catalog/metadata:
    get:
      tags: [Catálogo]
      summary: Metadatos del catálogo
      operationId: catalogMetadata
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Metadatos actuales
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Metadata'
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }
  /me:
    get:
      tags: [Perfil]
      summary: Propietario del token
      operationId: tokenOwner
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Identidad mínima
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Me'
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Sanctum
  schemas:
    AgencyStatus:
      type: string
      enum: [active, inactive, temporarily_closed, under_review, moved]
    AgencyPublicStatus:
      type: string
      description: Estado operativo actual de la agencia.
      enum: [Activa, Inactiva, Cerrada temporalmente, En revisión, Trasladada]
      example: Activa
    AgencyStatusOption:
      type: object
      required: [value, label]
      properties:
        value: { $ref: '#/components/schemas/AgencyStatus' }
        label: { $ref: '#/components/schemas/AgencyPublicStatus' }
    Agency:
      type: object
      additionalProperties: false
      required: [internal_id, id, code, agencia, departamento, provincia, distrito, direccion, link_mapa, tamano, estado, centro_operaciones, texto_chosen_terrestre, texto_chosen_aereo]
      properties:
        internal_id: { type: integer, format: int64, example: 25 }
        id: { type: integer, format: int64, nullable: true, example: 610 }
        code: { type: string, example: SHA-000610 }
        agencia: { type: string, example: Yarinacocha Av Universitaria }
        departamento: { type: string, example: Ucayali }
        provincia: { type: string, example: Coronel Portillo }
        distrito: { type: string, example: Pucallpa Yarinacocha }
        direccion: { type: string, example: av. universitaria mza a lote 6 }
        link_mapa: { type: string, format: uri, nullable: true, example: 'https://www.google.com/maps/dir/?api=1&destination=-8.380017,-74.568467' }
        tamano: { type: string, nullable: true, example: Pequeño }
        estado: { $ref: '#/components/schemas/AgencyPublicStatus' }
        centro_operaciones:
          type: boolean
          description: Indica si la agencia funciona como Centro de Operaciones.
          example: true
        texto_chosen_terrestre: { type: string, nullable: true, example: 610 - UCAYALI - YARINACOCHA - TERRESTRE }
        texto_chosen_aereo: { type: string, nullable: true, example: null }
    AgencyDeleted:
      type: object
      required: [internal_id, id, code, deleted_at]
      properties:
        internal_id: { type: integer, format: int64, example: 31 }
        id: { type: integer, format: int64, nullable: true, example: 700 }
        code: { type: string, example: SHA-000700 }
        deleted_at: { type: string, format: date-time }
    AgencyChanges:
      type: object
      required: [data, meta]
      properties:
        data:
          type: object
          required: [upserted, deleted]
          properties:
            upserted: { type: array, items: { $ref: '#/components/schemas/Agency' } }
            deleted: { type: array, items: { $ref: '#/components/schemas/AgencyDeleted' } }
        meta:
          type: object
          required: [next_cursor, has_more, schema_version, generated_at]
          properties:
            next_cursor: { type: string }
            has_more: { type: boolean }
            schema_version: { type: integer, example: 2 }
            generated_at: { type: string, format: date-time }
    AgencyPage:
      type: object
      required: [data, links, meta]
      properties:
        data: { type: array, items: { $ref: '#/components/schemas/Agency' } }
        links: { type: object }
        meta: { type: object }
    Metadata:
      type: object
      required: [schema_version, catalog_revision, generated_at, total_agencies, last_agency_update, last_agency_deletion, current_cursor, supports_incremental_sync, changes_endpoint, full_sync_required_after_days, available_statuses, available_status_options, supports_operations_center, available_channels]
      properties:
        schema_version: { type: integer, example: 2 }
        catalog_revision: { type: string }
        generated_at: { type: string, format: date-time }
        total_agencies: { type: integer }
        last_agency_update: { type: string, format: date-time, nullable: true }
        last_agency_deletion: { type: string, format: date-time, nullable: true }
        current_cursor: { type: string }
        supports_incremental_sync: { type: boolean, example: true }
        changes_endpoint: { type: string, example: /api/v1/agencies/changes }
        full_sync_required_after_days: { type: integer, example: 180 }
        available_statuses: { type: array, items: { $ref: '#/components/schemas/AgencyStatus' } }
        available_status_options: { type: array, items: { $ref: '#/components/schemas/AgencyStatusOption' } }
        supports_operations_center: { type: boolean, example: true }
        available_channels: { type: array, items: { type: string, enum: [terrestrial, air] } }
    Me:
      type: object
      required: [id, name, email, token_name, abilities]
      properties:
        id: { type: integer }
        name: { type: string }
        email: { type: string, format: email }
        token_name: { type: string, nullable: true }
        abilities: { type: array, items: { type: string } }
    Health:
      type: object
      required: [status, api_version, timestamp]
      properties:
        status: { type: string, enum: [ok, degraded] }
        api_version: { type: string, example: v1 }
        timestamp: { type: string, format: date-time }
    Error:
      type: object
      required: [message]
      properties:
        message: { type: string }
  responses:
    FullSyncRequired:
      description: El cursor fue alterado, expiró por retención o usa otra versión de esquema
      content:
        application/json:
          schema:
            type: object
            required: [message, code, meta]
            properties:
              message: { type: string }
              code: { type: string, enum: [full_sync_required] }
              meta:
                type: object
                properties:
                  schema_version: { type: integer }
          example:
            message: El cursor ya no es válido. Se requiere una sincronización completa.
            code: full_sync_required
            meta: { schema_version: 1 }
    Unauthenticated:
      description: Token ausente, inválido, revocado o expirado
      content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }
    Forbidden:
      description: Ability insuficiente
      content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }
    NotFound:
      description: Agencia no encontrada
      content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }
    ValidationError:
      description: Filtros inválidos
      content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }
    RateLimited:
      description: Límite excedido
      content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }
