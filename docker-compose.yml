services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: codered-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  nginx:
    image: nginx:1.27-alpine
    container_name: codered-nginx
    restart: unless-stopped
    ports:
      - "8090:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  postgres:
    image: postgres:16-alpine
    container_name: codered-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: codered-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1"]
    volumes:
      - redisdata:/data

  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: codered-queue
    restart: unless-stopped
    working_dir: /var/www/html
    command: ["php", "artisan", "queue:work", "redis", "--queue=ruc-imports,default", "--sleep=2", "--tries=3", "--timeout=7200", "--max-time=86400"]
    stop_grace_period: 2h
    volumes:
      - ./:/var/www/html
    depends_on:
      - app
      - redis
      - postgres

  reniec-queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: codered-reniec-queue
    restart: unless-stopped
    working_dir: /var/www/html
    command: ["php", "artisan", "queue:work", "redis", "--queue=reniec-imports", "--sleep=3", "--tries=1", "--timeout=86400", "--max-time=172800", "--memory=768"]
    stop_signal: SIGTERM
    stop_grace_period: 60s
    volumes:
      - ./:/var/www/html
    depends_on:
      - app
      - redis
      - postgres

  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: codered-scheduler
    restart: unless-stopped
    working_dir: /var/www/html
    command: ["sh", "-lc", "while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"]
    volumes:
      - ./:/var/www/html
    depends_on:
      - app
      - redis
      - postgres

volumes:
  pgdata:
  redisdata:
